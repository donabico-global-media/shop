<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="meta-title">Verified Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #334155; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <section class="border-2 border-dashed border-blue-500 w-full max-w-4xl p-6 rounded-xl mb-10 bg-[#0f172a]">
        <h2 class="text-blue-400 font-bold mb-4 uppercase">📥 CẤU HÌNH DỮ LIỆU TỰ ĐỘNG</h2>
        <script>
            // 48 TEMPLATE DỮ LIỆU ĐƯỢC NẠP SẴN (Thêm đủ 48 vào đây)
            const TEMPLATE_LIBRARY = {
                "8000Kicks": { color: "emerald", desc: "Sustainable Hemp Performance Node.", link: "https://8000kicks.sjv.io/donabico_global_media", img: ["https://i.postimg.cc/0yh4WRJc/8000kicks-001.jpg", "https://i.postimg.cc/fR1P2n0g/8000kicks-002.jpg"] },
                "NikePro": { color: "orange", desc: "Elite Athletic Engineering Engine.", link: "#", img: ["https://via.placeholder.com/300"] },
                "CryptoBot": { color: "purple", desc: "Algorithmic Asset Management Node.", link: "#", img: ["https://via.placeholder.com/300"] }
            };

            // CHỈ CẦN ĐỔI BRAND Ở ĐÂY, TRANG WEB SẼ TỰ "BIẾN HÌNH"
            const currentBrand = "8000Kicks"; 
            const data = TEMPLATE_LIBRARY[currentBrand];
        </script>
    </section>

    <main class="max-w-4xl w-full space-y-8 text-center">
        <h1 id="title" class="text-6xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r">Loading...</h1>
        <p id="desc" class="text-2xl italic text-slate-400"></p>
        
        <section id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4"></section>

        <button onclick="window.location.href=data.link" id="cta-btn" 
                class="w-full text-3xl font-black py-8 rounded-2xl uppercase tracking-widest transition hover:scale-[1.02] shadow-2xl">
            INITIALIZE VERIFICATION ROUTE
        </button>
    </main>

    <script>
        // ENGINE TỰ ĐỘNG THÍCH ỨNG
        document.getElementById('meta-title').innerText = currentBrand + " Official Node";
        document.getElementById('title').innerText = currentBrand + " Official Node";
        document.getElementById('title').classList.add(`from-${data.color}-400`, "to-cyan-400");
        document.getElementById('desc').innerText = data.desc;
        document.getElementById('cta-btn').classList.add(`bg-gradient-to-r`, `from-${data.color}-500`, "to-cyan-500");

        const gallery = document.getElementById('gallery');
        data.img.forEach(url => {
            const img = document.createElement('img');
            img.src = url; img.className = "rounded-xl border border-slate-700 w-full h-48 object-cover";
            gallery.appendChild(img);
        });
    </script>
</body>
</html>
