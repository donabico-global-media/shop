

<!DOCTYPE html>
<html lang="en">
<head>

        .grid-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .grid-gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; border: 1px solid #334155; }
        .btn { display: block; width: 100%; padding: 15px; background: linear-gradient(to right, #10b981, #06b6d4); color: black; font-weight: bold; text-decoration: none; border-radius: 10px; text-align: center; font-size: 18px; }
